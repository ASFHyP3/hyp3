PISM_TERRA_RUN_FORWARD:
  required_parameters:
    - rgi_id
  parameters:
    rgi_id:
      api_schema:
        description: Randolph Glacier Inventory 7.0 identifier the a glacier complex to simulate
        type: string
        pattern: 'RGI2000-v7.0-C-.*$'
        example: RGI2000-v7.0-C-01-09429
    pism_config:
      api_schema:
        description: URI to a PISM config file or the path to one bundled within the pism-terra package
        type: string
        default: config/era5_ec2.toml
    run_template:
      api_schema:
        description: URI to a Jinja2 run template or the path to one bundled within the pism-terra package
        type: string
        default: templates/ec2.j2
    uq_config:
      api_schema:
        description: URI to a PISM UQ config file or the path to one bundled within the pism-terra package. Supply to render an ensemble; omit for a single-glacier run
        type: string
        nullable: true
        default: null
        example: uq/era5_pdd.toml
    ntasks:
      api_schema:
        description: Number of MPI tasks to use when executing PISM simulations
        type: integer
        default: 32
        minimum: 2
        maximum: 32
    resolution:
      api_schema:
        description: Override horizontal grid resolution
        type: string
        nullable: true
        default: null
    stress_balance:
      api_schema:
        description: Override the [stress_balance].model selection
        type: string
        nullable: true
        default: null
        example: sia
    start:
      api_schema:
        description: Override the time.start selection
        type: string
        nullable: true
        default: null
    end:
      api_schema:
        description: Override the time.end selection
        type: string
        nullable: true
        default: null
    posterior_file:
      api_schema:
        description: CSV file of posterior parameter distributions to sample from (ensemble mode only)
        type: string
        nullable: true
        default: null
    pism_config_cdl:
      api_schema:
        description: Path to PISM CDL config file for option validation
        type: string
        nullable: true
        default: null
  cost_profiles:
    DEFAULT:
      cost: 1.0
  validators: []
  steps:
    - name: ''
      image: ghcr.io/pism/pism-terra
      command:
        - ++process
        - pism-glacier-run-forward
        - Ref::rgi_id
        - Ref::pism_config
        - Ref::run_template
        - Ref::uq_config
        - --bucket
        - Ref::bucket
        - --bucket-prefix
        - Ref::bucket_prefix
        - --ntasks
        - Ref::ntasks
        - --resolution
        - Ref::resolution
        - --stress-balance
        - Ref::stress_balance
        - --start
        - Ref::start
        - --end
        - Ref::end
        - --posterior-file
        - Ref::posterior_file
        - --pism-config-cdl
        - Ref::pism_config_cdl
      secrets:
        - CDS_API_URL
        - CDS_API_KEY
      timeout: 10800  # 3 hours
      compute_environment: Default
      vcpu: 32
      memory: 254000
      linux_parameters:
        SharedMemorySize: 15259
