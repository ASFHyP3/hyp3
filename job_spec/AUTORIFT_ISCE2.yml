AUTORIFT_ISCE2:
  required_parameters:
    - granules
  parameters:
    granules:
      api_schema:
        type: array
        minItems: 2
        maxItems: 2
        example:
          - S1_239060_IW3_20161231T090921_HH_5EC1-BURST
          - S1_239060_IW3_20170106T091002_HH_1467-BURST
        items:
          description: Name of the Sentinel-1 SLC IW burst granule to process
          type: string
          pattern: "^S1_\\d{6}_IW.*-BURST"
          minLength: 43
          maxLength: 43
          example: S1_136231_IW2_20200604T022312_VV_7C85-BURST
    parameter_file:
      api_schema:
        description: Shapefile for determining the correct search parameters by geographic location. Path to shapefile must be understood by GDAL.
        type: string
        default: '/vsicurl/http://its-live-data.s3.amazonaws.com/autorift_parameters/v001/autorift_landice_0120m.shp'
    publish_bucket:
      api_schema:
        description: Publish the resulting product to the ITS_LIVE AWS Open Data (or test) S3 Bucket
        default: '""'
        type: string
        enum:
          - '""'
          - "its-live-data"
          - "its-live-data-test"
  cost_profiles:
    DEFAULT:
      cost: 1.0
  validators: []
  steps:
    - name: ''
      image: ghcr.io/asfhyp3/hyp3-autorift
      image_tag: 0.21.3.dev15_g891a184
      command:
        - ++omp-num-threads
        - '4'  # 4 vCPUs per 32 GB RAM for the R instance family
        - --bucket
        - '!Ref Bucket'
        - --bucket-prefix
        - Ref::job_id
        - --parameter-file
        - Ref::parameter_file
        - --publish-bucket
        - Ref::publish_bucket
        - --naming-scheme
        - ITS_LIVE_PROD
        - Ref::granules
      timeout: 10800
      compute_environment: Default
      vcpu: 1
      memory: 7600
      secrets:
        - EARTHDATA_USERNAME
        - EARTHDATA_PASSWORD
        - PUBLISH_ACCESS_KEY_ID
        - PUBLISH_SECRET_ACCESS_KEY
