PISM_TERRA_RUN:
  required_parameters:
    - rgi_id
  parameters:
    rgi_id:
      api_schema:
        description: Randolph Glacier Inventory 7.0 identifier the a glacier complex to simulate
        type: string
        pattern: 'RGI2000-v7.0-C-.*$'
        example: RGI2000-v7.0-C-01-09429
    rgi_gpkg:
      api_schema:
        description: URI to a PISM-terra GeoPackage prepared from Randolph Glacier Inventory 7.0
        type: string
        format: uri
        example: s3://pism-cloud-data/terra/rgi.gpkg
        default: s3://pism-cloud-data/terra/rgi.gpkg
    pism_config:
      api_schema:
        description: URI to a PISM Config file or the path to one bundled within the pism-terra package
        type: string
        example: config/era5_ec2.toml
        default: config/era5_ec2.toml
    run_template:
      api_schema:
        description: URI to a Jinja2 run template or the path to one bundled within the pism-terra package
        type: string
        example: templates/ec2.j2
        default: templates/ec2.j2
  cost_profiles:
    DEFAULT:
      cost: 1.0
  validators: []
  steps:
    - name: ''
      image: ghcr.io/pism/pism-terra
      image_tag: 0.0.3.dev46_g6febe1e3a
      command:
        - ++process
        - pism-glacier-run
        - Ref::rgi_id
        - Ref::rgi_gpkg
        - Ref::pism_config
        - Ref::run_template
        - --bucket
        - '!Ref Bucket'
        - --bucket-prefix
        - Ref::job_id
      timeout: 10800
      compute_environment: Default
      vcpu: 4
      memory: 31500
      secrets:
        - CDS_API_URL
        - CDS_API_KEY
    - name: PISM_EXECUTE
      image: ghcr.io/pism/pism-cloud
      image_tag: b280b0d280bef0e7b5a4c22a9cb4e58ffbb3719f
      command:
        - --bucket
        - '!Ref Bucket'
        - --bucket-prefix
        - Ref::job_id
        - --run-dir
        - Ref::rgi_id
      timeout: 10800
      compute_environment: Default
      vcpu: 16
      memory: 127000
