PISM_TERRA_EXECUTE:
  required_parameters:
    - run_script
  parameters:
    run_script:
      api_schema:
        description: S3 URI to a run run scrip with a structure like `s3://.*/RGI*/runs_scripts/*.sh`
        type: string
        pattern: "^s3://.*/RGI.*/run_scripts/.*.sh"
        example: s3://pism-cloud-data/summer_school/inverse_test/224e6d60-95de-48fe-8f56-70e697a8ec15/RGI2000-v7.0-C-01-04374/run_scripts/submit_g500m_RGI2000-v7.0-C-01-04374_id_0_0001-01-01_0021-02-01.sh

  cost_profiles:
    DEFAULT:
      cost: 1.0
  validators: []
  steps:
    - name: ''
      image: ghcr.io/pism/pism-terra
      command:
        - ++process
        - pism-glacier-execute
        - Ref::run_script
        - --bucket
        - Ref::bucket
        - --bucket-prefix
        - Ref::bucket_prefix
      secrets:
        - CDS_API_URL
        - CDS_API_KEY
      timeout: 345600  # 96 hours
      compute_environment: Default
      vcpu: 32
      memory: 254000
      linux_parameters:
        SharedMemorySize: 15259
