STREAM_FLOW:
  required_parameters:
    - ERW_type
    - id_number
  parameters:
    ERW_type:
      api_schema:
        description: 'ERW_type ("node" or "reach")'
        type: string
        example: "node"
    id_number:
      api_schema:
        description: 'id_number (node_id or reach_id)'
        type: number
        format: integer
        example: 74270500050291
  cost_profiles:
    DEFAULT:
      cost: 1.0
  validators: []
  steps:
    - name: RTC
      image: 845172464411.dkr.ecr.us-west-2.amazonaws.com/hyp3-gamma
      command:
        - ++process
        - rtc
        - ++omp-num-threads
        - '4'
        - --bucket
        - '!Ref Bucket'
        - --bucket-prefix
        - Ref::job_id
        - --resolution
        - Ref::resolution
        - --speckle-filter
        - Ref::speckle_filter
        - --scale
        - 'power'
        - --radiometry
        - 'gamma0'
        - --dem-matching
        - 'false'
        - --include-dem
        - 'true'
        - --include-inc-map
        - 'false'
        - --include-scattering-area
        - 'false'
        - --include-rgb
        - 'true'
        - --dem-name
        - 'copernicus'
        - Ref::granules
      timeout: 36000
      compute_environment: Default
      vcpu: 1
      memory: 31500
      secrets:
        - EARTHDATA_USERNAME
        - EARTHDATA_PASSWORD
    - name: ''
      image: ghcr.io/fjmeyer/hydrosar
      command:
        - ++process
        - HYDRO30
        - --bucket
        - '!Ref Bucket'
        - --bucket-prefix
        - Ref::job_id
        - --max-vv-threshold
        - Ref::max_vv_threshold
        - --max-vh-threshold
        - Ref::max_vh_threshold
        - --hand-threshold
        - Ref::hand_threshold
        - --hand-fraction
        - Ref::hand_fraction
        - --membership-threshold
        - Ref::membership_threshold
      timeout: 36000
      compute_environment: Default
      vcpu: 1
      memory: 126000  
    - name: ''
      image: ghcr.io/asfhyp3/hyp3-streamflow
      command:
        - --bucket
        - '!Ref Bucket'
        - --bucket-prefix
        - Ref::job_id
        - --ERW_type
        - Ref::ERW_type
        - --id_number
        - Ref::id_number
      timeout: 5400
      compute_environment: Default
      vcpu: 1
      memory: 7600
      secrets:
        - EARTHDATA_PASSWORD
        - EARTHDATA_USERNAME
